<style>
/* ── CSS Variables ──────────────────────────────────────── */
:root {
  --bg: #f5f0e8;
  --bg-card: #ffffff;
  --bg-header: #5c4033;
  --bg-modal: #ffffff;
  --bg-overlay: rgba(0,0,0,0.45);
  --bg-input: #faf8f4;
  --text: #2c1810;
  --text-light: #6b5b4f;
  --text-inv: #faf8f4;
  --accent: #b85c38;
  --accent-hover: #a04e2e;
  --accent2: #4a7c59;
  --border: #d4c5b0;
  --badge-cat: #e8d5c4;
  --badge-loc: #c4d5c8;
  --shadow: 0 2px 8px rgba(44,24,16,0.10);
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

/* ── Reset & Base ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────── */
.header {
  background: var(--bg-header);
  color: var(--text-inv);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.header h1 {
  font-size: 1.3em;
  font-weight: 700;
  white-space: nowrap;
  letter-spacing: -0.5px;
}
.header-search {
  flex: 1;
  min-width: 200px;
  padding: 8px 14px;
  border: none;
  border-radius: var(--radius);
  font-size: 0.9em;
  background: rgba(255,255,255,0.15);
  color: var(--text-inv);
  outline: none;
}
.header-search::placeholder { color: rgba(255,255,255,0.5); }
.header-search:focus { background: rgba(255,255,255,0.25); }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 0.85em;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: var(--text-inv); }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: rgba(255,255,255,0.15); color: var(--text-inv); }
.btn-secondary:hover { background: rgba(255,255,255,0.25); }
.btn-green { background: var(--accent2); color: var(--text-inv); }
.btn-green:hover { background: #3d6a4a; }
.btn-danger { background: #c0392b; color: #fff; }
.btn-danger:hover { background: #a93226; }
.btn-outline {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 4px 10px; font-size: 0.78em; }

/* ── Auth UI ───────────────────────────────────────────── */
.auth-area { display: flex; align-items: center; gap: 8px; }
.user-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 4px 12px 4px 4px;
  cursor: pointer;
  font-size: 0.82em;
  transition: background 0.15s;
}
.user-chip:hover { background: rgba(255,255,255,0.25); }
.user-chip img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
}
.user-chip .user-name { color: var(--text-inv); }
.editor-badge {
  background: var(--accent2);
  color: #fff;
  font-size: 0.7em;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 2px;
}
.readonly-badge {
  background: rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
  font-size: 0.7em;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 2px;
}

/* ── Filter Bar ─────────────────────────────────────────── */
.filter-bar {
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
}
.filter-bar select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.85em;
  background: var(--bg-input);
  color: var(--text);
}
.filter-bar .item-count {
  margin-left: auto;
  font-size: 0.85em;
  color: var(--text-light);
}

/* ── Cards Grid ─────────────────────────────────────────── */
.cards-container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  max-width: 1400px;
  margin: 0 auto;
}
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border: 1px solid var(--border);
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(44,24,16,0.15);
}
.card-thumb {
  width: 100%;
  height: 160px;
  background: linear-gradient(135deg, #e8d5c4 0%, #d4c5b0 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.card-thumb img, .card-thumb svg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.card-thumb .placeholder {
  font-size: 3em;
  opacity: 0.3;
}
.card-body { padding: 14px; }
.card-body h3 {
  font-size: 1em;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.3;
}
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75em;
  font-weight: 500;
}
.badge-cat { background: var(--badge-cat); color: #6b4226; }
.badge-loc { background: var(--badge-loc); color: #2d5a3b; }

/* ── Empty State ────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-light);
  grid-column: 1 / -1;
}
.empty-state .icon { font-size: 4em; margin-bottom: 16px; opacity: 0.3; }
.empty-state h2 { font-size: 1.2em; margin-bottom: 8px; }
.empty-state p { font-size: 0.9em; margin-bottom: 20px; }

/* ── Modal ──────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  z-index: 200;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  overflow-y: auto;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-modal);
  border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  width: 100%;
  max-width: 600px;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h2 { font-size: 1.1em; }
.modal-close {
  background: none;
  border: none;
  font-size: 1.4em;
  cursor: pointer;
  color: var(--text-light);
  padding: 4px;
  line-height: 1;
}
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ── Form ───────────────────────────────────────────────── */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 0.85em;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--text-light);
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.9em;
  background: var(--bg-input);
  color: var(--text);
  font-family: var(--font);
}
.form-group textarea { min-height: 80px; resize: vertical; }
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(184,92,56,0.15);
}

/* ── Photo Gallery ──────────────────────────────────────── */
.photo-gallery {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.photo-item {
  position: relative;
  width: 80px;
  height: 80px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.photo-item img, .photo-item svg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.photo-item .remove-photo {
  position: absolute;
  top: 2px;
  right: 2px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  font-size: 0.7em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Stock Photo Picker ────────────────────────────────────── */
.stock-picker {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 8px;
  margin-top: 8px;
  max-height: 200px;
  overflow-y: auto;
  padding: 8px;
  background: var(--bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.stock-thumb {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.15s, transform 0.1s;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}
.stock-thumb:hover {
  border-color: var(--accent);
  transform: scale(1.05);
}
.stock-thumb svg {
  width: 100%;
  height: 100%;
}

/* ── Categories List ────────────────────────────────────── */
.cat-list { list-style: none; }
.cat-list li {
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.cat-list li:last-child { border-bottom: none; }
.cat-info { display: flex; align-items: center; gap: 10px; }
.cat-count {
  font-size: 0.8em;
  color: var(--text-light);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
}
.cat-actions { display: flex; gap: 4px; }
.cat-actions button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 0.9em;
  padding: 4px 6px;
  border-radius: 4px;
  color: var(--text-light);
}
.cat-actions button:hover { background: var(--bg); color: var(--text); }

/* ── Timestamps ─────────────────────────────────────────── */
.timestamps {
  font-size: 0.78em;
  color: var(--text-light);
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* ── Loading Spinner ────────────────────────────────────── */
.spinner-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.7);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.spinner-overlay.active { display: flex; }
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ──────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-header);
  color: var(--text-inv);
  padding: 12px 24px;
  border-radius: var(--radius);
  font-size: 0.9em;
  z-index: 400;
  transition: transform 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.toast.active { transform: translateX(-50%) translateY(0); }
.toast.error { background: #c0392b; }

/* ── Config Banner ──────────────────────────────────────── */
.config-banner {
  background: #fff3cd;
  border-bottom: 1px solid #ffc107;
  padding: 12px 20px;
  text-align: center;
  font-size: 0.9em;
}
.config-banner code {
  background: rgba(0,0,0,0.08);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.85em;
}

/* ── Language Toggle ────────────────────────────────────── */
.lang-toggle {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: var(--text-inv);
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 0.78em;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: background 0.15s;
  white-space: nowrap;
}
.lang-toggle:hover { background: rgba(255,255,255,0.25); }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 600px) {
  .header { padding: 10px 12px; gap: 10px; }
  .header h1 { font-size: 1.1em; }
  .cards-container { padding: 12px; gap: 12px; grid-template-columns: 1fr; }
  .modal { margin: 10px; }
  .user-chip .user-name { display: none; }
}
</style>
</head>

var currentLang = 'el';
var loadedTranslations = {};

function t(key) {
  if (loadedTranslations[currentLang] && loadedTranslations[currentLang][key]) {
    return loadedTranslations[currentLang][key];
  }
  var def = DEFAULT_TRANSLATIONS[key];
  if (def) return def[currentLang] || def['el'] || key;
  return key;
}

function setLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('archeovault_lang', lang);
  applyLanguage();
}

function toggleLanguage() {
  setLanguage(currentLang === 'el' ? 'en' : 'el');
}

async function loadTranslations() {
  try {
    var data = await apiGet({ action: 'getTranslations' });
    if (data.translations) {
      loadedTranslations = data.translations;
    }
  } catch (e) {
    // silently fall back to defaults
  }
}

async function seedTranslations() {
  try {
    await apiPost({ action: 'seedTranslations', translations: DEFAULT_TRANSLATIONS });
  } catch (e) {
    // non-critical
  }
}

let categories = [];
let items = [];
let currentPhotos = [];
let moveItemId = null;

// ── Auth State ─────────────────────────────────────────────

let authUser = null;   // { email, name, picture, idToken }
let isEditorUser = false;

function saveAuthToStorage() {
  if (authUser) {
    localStorage.setItem('archeovault_auth', JSON.stringify(authUser));
    localStorage.setItem('archeovault_isEditor', isEditorUser ? '1' : '0');
  }
}

function clearAuthFromStorage() {
  localStorage.removeItem('archeovault_auth');
  localStorage.removeItem('archeovault_isEditor');
}

function restoreAuthFromStorage() {
  try {
    const saved = localStorage.getItem('archeovault_auth');
    if (!saved) return false;
    const parsed = JSON.parse(saved);
    if (!parsed || !parsed.idToken || !parsed.email) return false;
    authUser = parsed;
    isEditorUser = localStorage.getItem('archeovault_isEditor') === '1';
    updateAuthUI();
    apiGet({ action: 'checkAccess', token: authUser.idToken }).then(function(data) {
      if (data.isEditor !== undefined) {
        isEditorUser = data.isEditor;
        updateAuthUI();
        saveAuthToStorage();
      }
    }).catch(function() {
      authUser = null;
      isEditorUser = false;
      clearAuthFromStorage();
      updateAuthUI();
      initGoogleSignIn();
    });
    return true;
  } catch (e) {
    clearAuthFromStorage();
    return false;
  }
}

function handleCredentialResponse(response) {
  var idToken = response.credential;
  var payload = JSON.parse(atob(idToken.split('.')[1]));
  authUser = {
    email: payload.email,
    name: payload.name || payload.email,
    picture: payload.picture || '',
    idToken: idToken
  };

  apiGet({ action: 'checkAccess', token: idToken }).then(function(data) {
    isEditorUser = data.isEditor || false;
    updateAuthUI();
    saveAuthToStorage();
    if (isEditorUser) {
      showToast(t('auth.loginEditor') + authUser.email);
    } else {
      showToast(t('auth.loginReadonly') + authUser.email);
    }
  }).catch(function() {
    isEditorUser = false;
    updateAuthUI();
    saveAuthToStorage();
  });
}

function signOut() {
  showConfirm(
    t('auth.signOutTitle'),
    t('auth.signOutConfirm'),
    [
      { label: t('btn.cancel'), cls: 'btn-outline', action: function() { closeModal('confirmModal'); } },
      { label: t('auth.signOutBtn'), cls: 'btn-danger', action: function() {
        closeModal('confirmModal');
        authUser = null;
        isEditorUser = false;
        clearAuthFromStorage();
        updateAuthUI();
        google.accounts.id.disableAutoSelect();
        initGoogleSignIn();
        showToast(t('auth.signedOut'));
      }}
    ]
  );
}

function updateAuthUI() {
  var signInBtn = document.getElementById('googleSignInBtn');
  var userChip = document.getElementById('userChip');

  if (authUser) {
    signInBtn.style.display = 'none';
    var imgHtml = authUser.picture
      ? '<img src="' + authUser.picture + '" alt="" referrerpolicy="no-referrer">'
      : '';
    var badgeHtml = isEditorUser
      ? '<span class="editor-badge">Editor</span>'
      : '<span class="readonly-badge">Read-only</span>';
    userChip.innerHTML =
      '<div class="user-chip" onclick="signOut()" title="' + escHtml(t('auth.clickToSignOut')) + '">' +
        imgHtml +
        '<span class="user-name">' + escHtml(authUser.name.split(' ')[0]) + '</span>' +
        badgeHtml +
      '</div>';
    userChip.style.display = '';
  } else {
    signInBtn.style.display = '';
    userChip.style.display = 'none';
    userChip.innerHTML = '';
  }

  document.querySelectorAll('.editor-only').forEach(function(el) {
    el.style.display = isEditorUser ? '' : 'none';
  });
}

function initGoogleSignIn() {
  if (!GOOGLE_CLIENT_ID) return;
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleCredentialResponse,
    auto_select: true
  });
  google.accounts.id.renderButton(
    document.getElementById('googleSignInBtn'),
    { theme: 'filled_black', size: 'medium', shape: 'pill', text: 'signin', locale: 'el' }
  );
}

// ── Category Tree Helpers ─────────────────────────────────

function buildCategoryTree(cats) {
  var map = {};
  var roots = [];
  cats.forEach(function(c) { map[c.id] = Object.assign({}, c, { children: [] }); });
  cats.forEach(function(c) {
    var parentId = String(c.parentId || '');
    if (parentId && map[parentId]) {
      map[parentId].children.push(map[c.id]);
    } else {
      roots.push(map[c.id]);
    }
  });
  return roots;
}

function flattenTree(nodes, depth) {
  var result = [];
  nodes.forEach(function(node) {
    result.push({ id: node.id, name: node.name, parentId: node.parentId, depth: depth || 0 });
    if (node.children && node.children.length > 0) {
      result = result.concat(flattenTree(node.children, (depth || 0) + 1));
    }
  });
  return result;
}

function getCategoryAndDescendantNames(catName) {
  var cat = categories.find(function(c) { return c.name === catName; });
  if (!cat) return [catName];
  var names = [catName];
  var queue = [cat.id];
  while (queue.length > 0) {
    var current = queue.shift();
    categories.forEach(function(c) {
      if (String(c.parentId || '') === String(current)) {
        names.push(c.name);
        queue.push(c.id);
      }
    });
  }
  return names;
}

function getCategoryItemCount(catId) {
  var cat = categories.find(function(c) { return c.id === catId; });
  if (!cat) return 0;
  return items.filter(function(it) { return it.category === cat.name; }).length;
}

// ── API Helpers ────────────────────────────────────────────

function showSpinner() { document.getElementById('spinner').classList.add('active'); }
function hideSpinner() { document.getElementById('spinner').classList.remove('active'); }

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' active';
  setTimeout(function() { t.classList.remove('active'); }, 3000);
}

async function apiGet(params) {
  if (!API_URL) throw new Error('API not configured');
  var url = API_URL + '?' + new URLSearchParams(params).toString();
  var resp = await fetch(url);
  var data = await resp.json();
  if (!data.success) throw new Error(data.error || 'Unknown error');
  return data;
}

async function apiPost(body) {
  if (!API_URL) throw new Error('API not configured');
  if (!authUser || !isEditorUser) throw new Error(t('auth.editorRequired'));
  body._idToken = authUser.idToken;
  var resp = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  var data = await resp.json();
  if (!data.success) {
    if (data.error === 'AUTH_REQUIRED' || data.error === 'INVALID_TOKEN') {
      authUser = null;
      isEditorUser = false;
      clearAuthFromStorage();
      updateAuthUI();
      initGoogleSignIn();
      throw new Error(t('auth.sessionExpired'));
    }
    if (data.error === 'NOT_EDITOR') {
      throw new Error(data.message || t('auth.editorRequired'));
    }
    throw new Error(data.error || 'Unknown error');
  }
  return data;
}

// ── Convert Google Drive share link to direct image URL ────

function driveToDirectUrl(url) {
  if (!url) return '';
  var match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w800';
  match = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (match) return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w800';
  return url;
}

// ── Data Loading ───────────────────────────────────────────

async function loadAll() {
  showSpinner();
  try {
    var results = await Promise.all([
      apiGet({ action: 'getCategories' }),
      apiGet({ action: 'getItems' })
    ]);
    categories = results[0].categories || [];
    items = results[1].items || [];
    updateCategoryDropdowns();
    updateLocationDropdown();
    renderItems();
  } catch (err) {
    showToast(t('toast.errorLoad') + err.message, true);
  } finally {
    hideSpinner();
  }
}

// ── Rendering ──────────────────────────────────────────────

function renderItems() {
  var container = document.getElementById('cardsContainer');
  var search = document.getElementById('searchInput').value.toLowerCase();
  var filterCat = document.getElementById('filterCategory').value;
  var filterLoc = document.getElementById('filterLocation').value;

  var allowedCatNames = filterCat ? getCategoryAndDescendantNames(filterCat) : null;

  var filtered = items.filter(function(it) {
    if (allowedCatNames && allowedCatNames.indexOf(it.category) === -1) return false;
    if (filterLoc && it.location !== filterLoc) return false;
    if (search) {
      var haystack = [it.name, it.category, it.location, it.description].join(' ').toLowerCase();
      if (haystack.indexOf(search) === -1) return false;
    }
    return true;
  });

  document.getElementById('itemCount').textContent =
    filtered.length === items.length
      ? items.length + ' ' + t('items.count')
      : filtered.length + ' ' + t('items.countOf') + ' ' + items.length + ' ' + t('items.count');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">' +
      '<div class="icon">🏺</div>' +
      '<h2>' + (items.length === 0 ? t('empty.noItems') : t('empty.noResults')) + '</h2>' +
      '<p>' + (items.length === 0
        ? (isEditorUser ? t('empty.addHint') : t('empty.loginHint'))
        : t('empty.filterHint')) + '</p>' +
      '</div>';
    return;
  }

  container.innerHTML = filtered.map(function(it) {
    var photos = (it.photos || '').split(',').filter(Boolean);
    var thumbHtml = '';
    if (photos.length > 0) {
      if (isStockPhoto(photos[0])) {
        var stock = STOCK_IMAGES.find(function(s) { return s.id === getStockId(photos[0]); });
        thumbHtml = stock ? stock.svg : '<span class="placeholder">🏺</span>';
      } else {
        var thumbUrl = driveToDirectUrl(photos[0]);
        thumbHtml = '<img src="' + thumbUrl + '" alt="" onerror="this.parentElement.innerHTML=\'<span class=placeholder>🏺</span>\'">';
      }
    } else {
      thumbHtml = '<span class="placeholder">🏺</span>';
    }
    return '<div class="card" onclick="' + (isEditorUser ? 'openItemModal(\'' + it.id + '\')' : 'viewItemDetail(\'' + it.id + '\')') + '">' +
      '<div class="card-thumb">' + thumbHtml + '</div>' +
      '<div class="card-body">' +
        '<h3>' + escHtml(it.name) + '</h3>' +
        '<div class="card-badges">' +
          (it.category ? '<span class="badge badge-cat">' + escHtml(it.category) + '</span>' : '') +
          (it.location ? '<span class="badge badge-loc">' + escHtml(it.location) + '</span>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function updateCategoryDropdowns() {
  var filterSel = document.getElementById('filterCategory');
  var itemSel = document.getElementById('itemCategory');
  var parentSel = document.getElementById('newCatParent');
  var currentFilter = filterSel.value;

  var tree = buildCategoryTree(categories);
  var flat = flattenTree(tree, 0);

  filterSel.innerHTML = '<option value="">' + t('filter.allCategories') + '</option>' +
    flat.map(function(c) {
      var indent = c.depth > 0 ? '  '.repeat(c.depth) + '└ ' : '';
      return '<option value="' + escHtml(c.name) + '">' + indent + escHtml(c.name) + '</option>';
    }).join('');
  filterSel.value = currentFilter;

  itemSel.innerHTML = '<option value="">' + t('select.choose') + '</option>' +
    flat.map(function(c) {
      var indent = c.depth > 0 ? '  '.repeat(c.depth) + '└ ' : '';
      return '<option value="' + escHtml(c.name) + '">' + indent + escHtml(c.name) + '</option>';
    }).join('');

  if (parentSel) {
    parentSel.innerHTML = '<option value="">' + t('parent.none') + '</option>' +
      flat.map(function(c) {
        var indent = c.depth > 0 ? '  '.repeat(c.depth) + '└ ' : '';
        return '<option value="' + escHtml(c.id) + '">' + indent + escHtml(c.name) + '</option>';
      }).join('');
  }
}

function updateLocationDropdown() {
  var sel = document.getElementById('filterLocation');
  var current = sel.value;
  var locSet = {};
  items.forEach(function(i) { if (i.location) locSet[i.location] = true; });
  var locations = Object.keys(locSet).sort();
  sel.innerHTML = '<option value="">' + t('filter.allLocations') + '</option>' +
    locations.map(function(l) { return '<option value="' + escHtml(l) + '">' + escHtml(l) + '</option>'; }).join('');
  sel.value = current;
}

// ── View-only Item Detail ──────────────────────────────────

function viewItemDetail(id) {
  var item = items.find(function(i) { return i.id === id; });
  if (!item) return;
  var photos = (item.photos || '').split(',').filter(Boolean);
  var photosHtml = photos.length > 0
    ? '<div class="photo-gallery" style="margin-top:12px">' +
        photos.map(function(url) {
          if (isStockPhoto(url)) {
            var stock = STOCK_IMAGES.find(function(s) { return s.id === getStockId(url); });
            return stock ? '<div class="photo-item">' + stock.svg + '</div>' : '';
          }
          return '<div class="photo-item"><img src="' + driveToDirectUrl(url) + '" alt="" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><rect fill=%22%23ddd%22 width=%2280%22 height=%2280%22/><text x=%2240%22 y=%2245%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2212%22>!</text></svg>\'"></div>';
        }).join('') +
      '</div>'
    : '';
  document.getElementById('confirmTitle').textContent = item.name;
  document.getElementById('confirmMessage').innerHTML =
    (item.category ? '<span class="badge badge-cat">' + escHtml(item.category) + '</span> ' : '') +
    (item.location ? '<span class="badge badge-loc">' + escHtml(item.location) + '</span>' : '') +
    (item.description ? '<p style="margin-top:12px">' + escHtml(item.description) + '</p>' : '') +
    photosHtml +
    '<div class="timestamps" style="display:block">' + t('ts.created') + formatDate(item.createdAt) + '<br>' + t('ts.updated') + formatDate(item.updatedAt) + '</div>';
  document.getElementById('confirmFooter').innerHTML =
    '<button class="btn btn-outline" onclick="closeModal(\'confirmModal\')">' + t('btn.close') + '</button>';
  document.getElementById('confirmModal').classList.add('active');
}

// ── Item Modal ─────────────────────────────────────────────

function openItemModal(id) {
  if (!isEditorUser) { showToast(t('auth.editorRequiredEdit'), true); return; }

  var modal = document.getElementById('itemModal');
  var title = document.getElementById('itemModalTitle');
  var delBtn = document.getElementById('deleteItemBtn');
  var ts = document.getElementById('itemTimestamps');

  document.getElementById('itemId').value = '';
  document.getElementById('itemName').value = '';
  document.getElementById('itemCategory').value = '';
  document.getElementById('itemLocation').value = '';
  document.getElementById('itemDescription').value = '';
  currentPhotos = [];
  renderPhotoGallery();
  updateCategoryDropdowns();

  if (id) {
    var item = items.find(function(i) { return i.id === id; });
    if (!item) return;
    title.textContent = t('modal.editItem');
    document.getElementById('itemId').value = item.id;
    document.getElementById('itemName').value = item.name || '';
    document.getElementById('itemCategory').value = item.category || '';
    document.getElementById('itemLocation').value = item.location || '';
    document.getElementById('itemDescription').value = item.description || '';
    currentPhotos = (item.photos || '').split(',').filter(Boolean);
    renderPhotoGallery();
    delBtn.style.display = '';
    ts.style.display = '';
    ts.innerHTML = t('ts.created') + formatDate(item.createdAt) + '<br>' + t('ts.lastUpdated') + formatDate(item.updatedAt);
  } else {
    title.textContent = t('modal.newItem');
    delBtn.style.display = 'none';
    ts.style.display = 'none';
  }

  modal.classList.add('active');
}

function formatDate(d) {
  if (!d) return '-';
  try {
    var dt = new Date(d);
    var locale = currentLang === 'en' ? 'en-GB' : 'el-GR';
    return dt.toLocaleDateString(locale) + ' ' + dt.toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' });
  } catch (e) { return d; }
}

async function saveItem() {
  var id = document.getElementById('itemId').value;
  var name = document.getElementById('itemName').value.trim();
  var category = document.getElementById('itemCategory').value;
  var location = document.getElementById('itemLocation').value.trim();
  var description = document.getElementById('itemDescription').value.trim();
  var photos = currentPhotos.join(',');

  if (!name) { showToast(t('valid.nameRequired'), true); return; }
  if (!category) { showToast(t('valid.catRequired'), true); return; }

  showSpinner();
  try {
    if (id) {
      await apiPost({ action: 'updateItem', id: id, name: name, category: category, location: location, description: description, photos: photos });
      showToast(t('toast.itemUpdated'));
    } else {
      await apiPost({ action: 'addItem', name: name, category: category, location: location, description: description, photos: photos });
      showToast(t('toast.itemAdded'));
    }
    closeModal('itemModal');
    await loadAll();
  } catch (err) {
    showToast(t('toast.error') + err.message, true);
  } finally {
    hideSpinner();
  }
}

async function deleteCurrentItem() {
  var id = document.getElementById('itemId').value;
  if (!id) return;
  var item = items.find(function(i) { return i.id === id; });
  showConfirm(
    t('confirm.deleteItem'),
    t('confirm.deleteItemMsg') + (item ? item.name : '') + '";',
    [
      { label: t('btn.cancel'), cls: 'btn-outline', action: function() { closeModal('confirmModal'); } },
      { label: t('btn.delete'), cls: 'btn-danger', action: async function() {
        closeModal('confirmModal');
        showSpinner();
        try {
          await apiPost({ action: 'deleteItem', id: id });
          showToast(t('toast.itemDeleted'));
          closeModal('itemModal');
          await loadAll();
        } catch (err) {
          showToast(t('toast.error') + err.message, true);
        } finally { hideSpinner(); }
      }}
    ]
  );
}

function getStockSvgDataUri(stockId) {
  var stock = STOCK_IMAGES.find(function(s) { return s.id === stockId; });
  if (!stock) return '';
  return 'data:image/svg+xml,' + encodeURIComponent(stock.svg);
}

function toggleStockPicker() {
  var picker = document.getElementById('stockPicker');
  if (picker.style.display === 'none') {
    picker.style.display = '';
    renderStockPicker();
  } else {
    picker.style.display = 'none';
  }
}

function renderStockPicker() {
  var picker = document.getElementById('stockPicker');
  picker.innerHTML = STOCK_IMAGES.map(function(s) {
    return '<div class="stock-thumb" onclick="selectStockImage(\'' + s.id + '\')" title="' + escHtml(s.label) + '">' + s.svg + '</div>';
  }).join('');
}

function selectStockImage(stockId) {
  var uri = 'stock:' + stockId;
  currentPhotos.push(uri);
  renderPhotoGallery();
  document.getElementById('stockPicker').style.display = 'none';
}

function isStockPhoto(url) {
  return url && url.indexOf('stock:') === 0;
}

function getStockId(url) {
  return url.replace('stock:', '');
}

// ── Photo Gallery ──────────────────────────────────────────

function addPhotoLink() {
  var input = document.getElementById('photoUrlInput');
  var url = input.value.trim();
  if (!url) return;
  currentPhotos.push(url);
  input.value = '';
  renderPhotoGallery();
}

function removePhoto(idx) {
  currentPhotos.splice(idx, 1);
  renderPhotoGallery();
}

function renderPhotoGallery() {
  var gallery = document.getElementById('photoGallery');
  if (currentPhotos.length === 0) {
    gallery.innerHTML = '';
    return;
  }
  gallery.innerHTML = currentPhotos.map(function(url, i) {
    if (isStockPhoto(url)) {
      var stock = STOCK_IMAGES.find(function(s) { return s.id === getStockId(url); });
      if (!stock) return '';
      return '<div class="photo-item">' +
        stock.svg +
        '<button class="remove-photo" onclick="event.stopPropagation();removePhoto(' + i + ')">✕</button>' +
      '</div>';
    }
    return '<div class="photo-item">' +
      '<img src="' + driveToDirectUrl(url) + '" alt="" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><rect fill=%22%23ddd%22 width=%2280%22 height=%2280%22/><text x=%2240%22 y=%2245%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2212%22>!</text></svg>\'">' +
      '<button class="remove-photo" onclick="event.stopPropagation();removePhoto(' + i + ')">✕</button>' +
    '</div>';
  }).join('');
}

// ── Move Item ──────────────────────────────────────────────

function openMoveModal(id) {
  var item = items.find(function(i) { return i.id === id; });
  if (!item) return;
  moveItemId = id;
  document.getElementById('moveItemName').textContent = item.name;
  document.getElementById('moveNewLocation').value = item.location || '';
  closeModal('itemModal');
  document.getElementById('moveModal').classList.add('active');
}

async function confirmMove() {
  var newLoc = document.getElementById('moveNewLocation').value.trim();
  if (!newLoc) { showToast(t('valid.locRequired'), true); return; }
  showSpinner();
  try {
    await apiPost({ action: 'moveItem', id: moveItemId, location: newLoc });
    showToast(t('toast.itemMoved'));
    closeModal('moveModal');
    await loadAll();
  } catch (err) {
    showToast(t('toast.error') + err.message, true);
  } finally { hideSpinner(); }
}

// ── Categories Modal ───────────────────────────────────────

function openCategoriesModal() {
  if (!isEditorUser) { showToast(t('auth.editorRequiredCat'), true); return; }
  updateCategoryDropdowns();
  renderCatList();
  document.getElementById('categoriesModal').classList.add('active');
}

function renderCatList() {
  var list = document.getElementById('catList');
  if (categories.length === 0) {
    list.innerHTML = '<li style="color:var(--text-light);font-style:italic;padding:16px;text-align:center">' + t('cat.noCats') + '</li>';
    return;
  }
  var tree = buildCategoryTree(categories);
  var flat = flattenTree(tree, 0);

  list.innerHTML = flat.map(function(c) {
    var count = getCategoryItemCount(c.id);
    var indent = c.depth > 0 ? 'padding-left:' + (12 + c.depth * 24) + 'px;' : '';
    var prefix = c.depth > 0 ? '<span style="color:var(--text-light);margin-right:4px">└</span>' : '';
    var escapedName = escHtml(c.name).replace(/'/g, "\\'");
    return '<li style="' + indent + '">' +
      '<div class="cat-info">' + prefix + '<span>' + escHtml(c.name) + '</span><span class="cat-count">' + count + '</span></div>' +
      '<div class="cat-actions">' +
        '<button title="' + t('cat.addSubcatTitle') + '" onclick="addSubcategory(\'' + c.id + '\',\'' + escapedName + '\')">➕</button>' +
        '<button title="' + t('cat.renameTitle') + '" onclick="renameCategory(\'' + c.id + '\',\'' + escapedName + '\')">✏️</button>' +
        '<button title="' + t('cat.deleteTitle') + '" onclick="deleteCategoryPrompt(\'' + c.id + '\',\'' + escapedName + '\',' + count + ')">🗑️</button>' +
      '</div>' +
    '</li>';
  }).join('');
}

async function addCategory() {
  var input = document.getElementById('newCatName');
  var parentSel = document.getElementById('newCatParent');
  var name = input.value.trim();
  if (!name) return;
  var parentId = parentSel ? parentSel.value : '';
  showSpinner();
  try {
    await apiPost({ action: 'addCategory', name: name, parentId: parentId });
    input.value = '';
    if (parentSel) parentSel.value = '';
    showToast(t('toast.catAdded'));
    await loadAll();
    renderCatList();
  } catch (err) {
    showToast(t('toast.error') + err.message, true);
  } finally { hideSpinner(); }
}

function addSubcategory(parentId, parentName) {
  var name = prompt(t('cat.addSubcatPrompt') + parentName + '":');
  if (!name || !name.trim()) return;
  showSpinner();
  apiPost({ action: 'addCategory', name: name.trim(), parentId: parentId })
    .then(function() { showToast(t('toast.subcatAdded')); return loadAll(); })
    .then(function() { renderCatList(); updateCategoryDropdowns(); })
    .catch(function(err) { showToast(t('toast.error') + err.message, true); })
    .finally(function() { hideSpinner(); });
}

function renameCategory(id, oldName) {
  var newName = prompt(t('cat.renamePrompt'), oldName);
  if (!newName || newName.trim() === oldName) return;
  showSpinner();
  apiPost({ action: 'renameCategory', id: id, name: newName.trim() })
    .then(function() { showToast(t('toast.catRenamed')); return loadAll(); })
    .then(function() { renderCatList(); })
    .catch(function(err) { showToast(t('toast.error') + err.message, true); })
    .finally(function() { hideSpinner(); });
}

function deleteCategoryPrompt(id, name, count) {
  if (count > 0) {
    var otherCats = categories.filter(function(c) { return c.id !== id; });
    var buttons = [
      { label: t('btn.cancel'), cls: 'btn-outline', action: function() { closeModal('confirmModal'); } },
      { label: t('confirm.deleteAll'), cls: 'btn-danger', action: function() { forceDeleteCategory(id, true, null); } }
    ];
    if (otherCats.length > 0) {
      buttons.splice(1, 0, {
        label: t('confirm.reassign'), cls: 'btn-green', action: function() {
          var target = prompt(t('cat.reassignPrompt1') + count + t('cat.reassignPrompt2') + '\n\n' + t('cat.available') + '\n' +
            otherCats.map(function(c) { return '  - ' + c.name; }).join('\n'));
          if (target) forceDeleteCategory(id, false, target.trim());
        }
      });
    }
    showConfirm(
      t('confirm.deleteCat'),
      '"' + name + '"' + t('confirm.deleteCatMsg') + count + t('confirm.deleteCatItems'),
      buttons
    );
  } else {
    showConfirm(
      t('confirm.deleteCat'),
      t('confirm.deleteCatEmpty') + name + '";',
      [
        { label: t('btn.cancel'), cls: 'btn-outline', action: function() { closeModal('confirmModal'); } },
        { label: t('btn.delete'), cls: 'btn-danger', action: function() { forceDeleteCategory(id, false, null); } }
      ]
    );
  }
}

async function forceDeleteCategory(id, deleteItems, reassignTo) {
  closeModal('confirmModal');
  showSpinner();
  try {
    var body = { action: 'deleteCategory', id: id, force: true };
    if (deleteItems) body.deleteItems = true;
    if (reassignTo) body.reassignTo = reassignTo;
    await apiPost(body);
    showToast(t('toast.catDeleted'));
    await loadAll();
    renderCatList();
  } catch (err) {
    showToast(t('toast.error') + err.message, true);
  } finally { hideSpinner(); }
}

// ── Export / Import ────────────────────────────────────────

async function exportData() {
  showSpinner();
  try {
    var data = await apiGet({ action: 'exportAll' });
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'archeovault-backup-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast(t('toast.exported'));
  } catch (err) {
    showToast(t('toast.errorExport') + err.message, true);
  } finally { hideSpinner(); }
}

async function importData() {
  var file = document.getElementById('importFile').files[0];
  if (!file) return;

  showConfirm(
    t('confirm.importTitle'),
    t('confirm.importMsg'),
    [
      { label: t('btn.cancel'), cls: 'btn-outline', action: function() { closeModal('confirmModal'); document.getElementById('importFile').value = ''; } },
      { label: t('btn.import'), cls: 'btn-danger', action: async function() {
        closeModal('confirmModal');
        showSpinner();
        try {
          var text = await file.text();
          var data = JSON.parse(text);
          await apiPost({ action: 'importAll', categories: data.categories, items: data.items });
          showToast(t('toast.imported'));
          closeModal('exportModal');
          await loadAll();
        } catch (err) {
          showToast(t('toast.errorImport') + err.message, true);
        } finally {
          hideSpinner();
          document.getElementById('importFile').value = '';
        }
      }}
    ]
  );
}

// ── Confirm Dialog ─────────────────────────────────────────

function showConfirm(title, message, buttons) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  document.getElementById('confirmFooter').innerHTML = buttons.map(function(b, i) {
    return '<button class="btn ' + b.cls + '" id="confirmBtn' + i + '">' + b.label + '</button>';
  }).join('');
  buttons.forEach(function(b, i) {
    document.getElementById('confirmBtn' + i).onclick = b.action;
  });
  document.getElementById('confirmModal').classList.add('active');
}

// ── Modal Helpers ──────────────────────────────────────────

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function openExportModal() {
  document.getElementById('exportModal').classList.add('active');
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

// ── Search ─────────────────────────────────────────────────

var searchTimeout;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(renderItems, 200);
});

// ── Init ───────────────────────────────────────────────────

// Restore language preference
var savedLang = localStorage.getItem('archeovault_lang');
if (savedLang && (savedLang === 'el' || savedLang === 'en')) {
  currentLang = savedLang;
}

if (!API_URL || !GOOGLE_CLIENT_ID) {
  document.getElementById('configBanner').textContent = t('config.banner');
  document.getElementById('configBanner').style.display = '';
}
if (API_URL) {
  loadTranslations().then(function() {
    applyLanguage();
    loadAll();
  });
} else {
  applyLanguage();
}
